<!DOCTYPE html>
<html lang="pt" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Recuperar Palavra-passe | BTS</title>
<meta name="robots" content="noindex, nofollow" />
<link rel="icon" type="image/jpeg" href="assets/images/logo-bts.jpg" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

<link rel="stylesheet" href="css/variables.css" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
<link rel="stylesheet" href="app/css/app.css" />
</head>
<body>

<div class="bts-login-page">
  <div class="bts-login-card">
    <img src="assets/images/logo-bts.jpg" alt="BTS" class="bts-login-logo" />
    <h1 class="bts-login-title">Recuperar Acesso</h1>
    <p class="bts-login-sub">Indica o teu email e enviamos-te um link para definires uma nova palavra-passe.</p>

    <div class="alert alert-danger bts-login-error" id="recuperar-error" role="alert"></div>
    <div class="alert alert-success bts-login-error" id="recuperar-sucesso" role="alert"></div>

    <form id="recuperar-form" novalidate>
      <div class="mb-3">
        <label class="bts-form-label" for="email">Email</label>
        <input type="email" class="form-control" id="email" name="email" autocomplete="username" required />
      </div>
      <button type="submit" class="btn btn-bts-primary w-100 py-2 mt-2" id="recuperar-submit">
        <i class="fa-solid fa-paper-plane me-1"></i> <span id="recuperar-submit-label">Enviar link de recuperação</span>
      </button>
    </form>

    <p class="text-center mt-4 mb-0">
      <a href="login.html" style="font-size:.82rem;color:var(--blue-text)"><i class="fa-solid fa-arrow-left me-1"></i>Voltar ao login</a>
    </p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app/js/env.js"></script>
<script src="app/js/supabaseClient.js"></script>
<script src="app/js/auth.js"></script>
<script>
  const form = document.getElementById('recuperar-form');
  const errorBox = document.getElementById('recuperar-error');
  const sucessoBox = document.getElementById('recuperar-sucesso');
  const submitBtn = document.getElementById('recuperar-submit');
  const submitLabel = document.getElementById('recuperar-submit-label');

  Auth.redirectIfLoggedIn('app/dashboard.html');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errorBox.style.display = 'none';
    sucessoBox.style.display = 'none';

    const email = document.getElementById('email').value.trim();
    const emailValido = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    if (!emailValido) {
      errorBox.textContent = 'Indica um email válido.';
      errorBox.style.display = 'block';
      return;
    }

    submitBtn.disabled = true;
    submitLabel.textContent = 'A enviar…';
    const result = await Auth.sendPasswordReset(email);
    submitBtn.disabled = false;
    submitLabel.textContent = 'Enviar link de recuperação';

    // Por segurança, mostramos sempre a mesma mensagem de sucesso,
    // quer o email exista na base de dados quer não — assim não se
    // revela a quem tenta adivinhar quais emails têm conta criada.
    if (result.ok) {
      form.style.display = 'none';
      sucessoBox.textContent = 'Se existir uma conta com este email, foi enviado um link de recuperação. Verifica a tua caixa de correio (e o spam).';
      sucessoBox.style.display = 'block';
    } else {
      errorBox.textContent = result.error;
      errorBox.style.display = 'block';
    }
  });
</script>
</body>
</html>
