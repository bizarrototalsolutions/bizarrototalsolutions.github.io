<!DOCTYPE html>
<html lang="pt" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Definir Nova Palavra-passe | BTS</title>
<meta name="robots" content="noindex, nofollow" />
<link rel="icon" type="image/jpeg" href="assets/images/logo-bts.jpg" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

<link rel="stylesheet" href="css/variables.css" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
<link rel="stylesheet" href="app/css/app.css" />
</head>
<body>

<div class="bts-login-page">
  <div class="bts-login-card">
    <img src="assets/images/logo-bts.jpg" alt="BTS" class="bts-login-logo" />
    <h1 class="bts-login-title">Nova Palavra-passe</h1>
    <p class="bts-login-sub" id="subtitulo">A validar o link de recuperação…</p>

    <div class="alert alert-danger bts-login-error" id="atualizar-error" role="alert"></div>
    <div class="alert alert-success bts-login-error" id="atualizar-sucesso" role="alert"></div>

    <form id="atualizar-form" novalidate style="display:none">
      <div class="mb-3">
        <label class="bts-form-label" for="password">Nova palavra-passe</label>
        <div class="input-group">
          <input type="password" class="form-control" id="password" name="password" autocomplete="new-password" required minlength="6" />
          <button class="btn btn-bts-outline" type="button" id="toggle-password" tabindex="-1"><i class="fa-solid fa-eye"></i></button>
        </div>
        <small class="text-muted" style="font-size:.75rem">Mínimo 6 caracteres.</small>
      </div>
      <div class="mb-3">
        <label class="bts-form-label" for="password-confirm">Confirmar nova palavra-passe</label>
        <input type="password" class="form-control" id="password-confirm" name="password-confirm" autocomplete="new-password" required minlength="6" />
      </div>
      <button type="submit" class="btn btn-bts-primary w-100 py-2 mt-2" id="atualizar-submit">
        <i class="fa-solid fa-key me-1"></i> <span id="atualizar-submit-label">Guardar nova palavra-passe</span>
      </button>
    </form>

    <p class="text-center mt-4 mb-0" id="voltar-login" style="display:none">
      <a href="login.html" style="font-size:.82rem;color:var(--blue-text)"><i class="fa-solid fa-arrow-left me-1"></i>Voltar ao login</a>
    </p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app/js/env.js"></script>
<script src="app/js/supabaseClient.js"></script>
<script src="app/js/auth.js"></script>
<script>
  const subtitulo = document.getElementById('subtitulo');
  const errorBox = document.getElementById('atualizar-error');
  const sucessoBox = document.getElementById('atualizar-sucesso');
  const form = document.getElementById('atualizar-form');
  const voltarLogin = document.getElementById('voltar-login');
  const submitBtn = document.getElementById('atualizar-submit');
  const submitLabel = document.getElementById('atualizar-submit-label');

  // O link do email traz o token na própria URL; o supabase-js (com
  // detectSessionInUrl: true) processa-o sozinho ao carregar a página
  // e cria uma sessão temporária de recuperação. Confirmamos que essa
  // sessão existe antes de mostrar o formulário.
  (async function validarLinkRecuperacao() {
    // Pequeno atraso para garantir que o cliente já processou o hash da URL.
    await new Promise((r) => setTimeout(r, 300));
    const session = await Auth.getSessionState();

    if (!session) {
      subtitulo.textContent = 'Este link é inválido ou já expirou.';
      errorBox.textContent = 'Pede um novo link em "Recuperar palavra-passe" a partir do login.';
      errorBox.style.display = 'block';
      voltarLogin.style.display = 'block';
      return;
    }

    subtitulo.textContent = 'Define a tua nova palavra-passe.';
    form.style.display = 'block';
  })();

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errorBox.style.display = 'none';
    sucessoBox.style.display = 'none';

    const password = document.getElementById('password').value;
    const passwordConfirm = document.getElementById('password-confirm').value;

    if (password.length < 6) {
      errorBox.textContent = 'A palavra-passe deve ter pelo menos 6 caracteres.';
      errorBox.style.display = 'block';
      return;
    }
    if (password !== passwordConfirm) {
      errorBox.textContent = 'As palavras-passe não coincidem.';
      errorBox.style.display = 'block';
      return;
    }

    submitBtn.disabled = true;
    submitLabel.textContent = 'A guardar…';
    const result = await Auth.updatePassword(password);
    submitBtn.disabled = false;
    submitLabel.textContent = 'Guardar nova palavra-passe';

    if (!result.ok) {
      errorBox.textContent = result.error;
      errorBox.style.display = 'block';
      return;
    }

    form.style.display = 'none';
    subtitulo.textContent = 'Palavra-passe atualizada.';
    sucessoBox.textContent = 'A tua palavra-passe foi alterada com sucesso. Vais ser redirecionado para o login.';
    sucessoBox.style.display = 'block';

    // Termina a sessão de recuperação e manda a pessoa entrar já com a nova palavra-passe.
    setTimeout(async () => {
      await Auth.logout();
    }, 2000);
  });

  document.getElementById('toggle-password').addEventListener('click', () => {
    const input = document.getElementById('password');
    const icon = document.querySelector('#toggle-password i');
    if (input.type === 'password') { input.type = 'text'; icon.className = 'fa-solid fa-eye-slash'; }
    else { input.type = 'password'; icon.className = 'fa-solid fa-eye'; }
  });
</script>
</body>
</html>
