<!DOCTYPE html>
<html lang="pt" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Agenda | BTS – Gestão</title>
<meta name="robots" content="noindex, nofollow" />
<link rel="icon" type="image/jpeg" href="../assets/images/logo-bts.jpg" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

<link rel="stylesheet" href="../css/variables.css" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
<link rel="stylesheet" href="css/app.css" />
</head>
<body class="bts-app" data-page="agenda">

<div id="bts-sidebar"></div>

<div id="bts-main">
  <div id="bts-topbar"></div>

  <div id="bts-content">
    <div class="bts-page-header">
      <div>
        <h1>Agenda</h1>
        <p>Vista de calendário dos serviços. Arrasta para reagendar, clica num dia/hora vazio para criar.</p>
      </div>
      <a href="servico.html" class="btn btn-bts-primary">
        <i class="fa-solid fa-plus me-1"></i> Novo Serviço
      </a>
    </div>

    <div class="bts-card mb-3">
      <div class="bts-card-body">
        <div class="bts-filters">
          <div class="bts-search" style="max-width:200px">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="busca-agenda" placeholder="Nº, cliente, tipo..." />
          </div>
          <select class="form-select form-select-sm" id="filtro-cliente-agenda"></select>
          <select class="form-select form-select-sm" id="filtro-estado-agenda"></select>
          <select class="form-select form-select-sm" id="filtro-categoria-agenda"></select>
          <select class="form-select form-select-sm" id="filtro-tipo-agenda"></select>
          <select class="form-select form-select-sm" id="filtro-prioridade-agenda"></select>
          <select class="form-select form-select-sm" id="filtro-zona-agenda"></select>
          <input type="text" class="form-control form-control-sm" id="filtro-funcionario-agenda" placeholder="Funcionário" style="max-width:120px" />
          <button class="btn btn-sm btn-bts-outline" id="limpar-filtros-agenda"><i class="fa-solid fa-filter-circle-xmark me-1"></i>Limpar</button>
        </div>
      </div>
    </div>

    <div id="bts-calendar"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.21/index.global.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@fullcalendar/core@6.1.21/locales/pt.global.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/env.js"></script>
<script src="js/supabaseClient.js"></script>
<script src="js/storage.js"></script>
<script src="js/auth.js"></script>
<script src="js/utils.js"></script>
<script src="js/ui.js"></script>
<script src="js/agenda-service.js"></script>
<script src="js/agenda.js"></script>
</body>
</html>
