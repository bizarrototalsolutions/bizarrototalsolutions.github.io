<!DOCTYPE html>
<html lang="pt" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Zonas | BTS – Gestão</title>
<meta name="robots" content="noindex, nofollow" />
<link rel="icon" type="image/jpeg" href="../assets/images/logo-bts.jpg" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

<link rel="stylesheet" href="../css/variables.css" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
<link rel="stylesheet" href="css/app.css" />
</head>
<body class="bts-app" data-page="zonas">

<div id="bts-sidebar"></div>

<div id="bts-main">
  <div id="bts-topbar"></div>

  <div id="bts-content">
    <div class="bts-page-header">
      <div>
        <h1>Zonas</h1>
        <p>Gestão central das zonas usadas em Clientes, Serviços, Agenda e Dashboard.</p>
      </div>
      <button class="btn btn-bts-primary" id="btn-nova-zona">
        <i class="fa-solid fa-plus me-1"></i> Nova Zona
      </button>
    </div>

    <div class="bts-card mb-3">
      <div class="bts-card-body">
        <div class="bts-filters">
          <div class="bts-search" style="max-width:260px">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="busca-zonas" placeholder="Nome ou código..." />
          </div>
          <select class="form-select form-select-sm" id="filtro-estado-zona"></select>
          <button class="btn btn-sm btn-bts-outline" id="limpar-filtros-zonas"><i class="fa-solid fa-filter-circle-xmark me-1"></i>Limpar</button>
          <span class="ms-auto text-muted small" id="contador-zonas"></span>
        </div>
      </div>
    </div>

    <div class="bts-table-wrap" id="tabela-zonas-wrap">
      <table class="bts-table" id="tabela-zonas">
        <thead>
          <tr>
            <th style="width:36px"></th>
            <th data-sort="nome">Nome <i class="fa-solid fa-sort"></i></th>
            <th data-sort="codigo">Código <i class="fa-solid fa-sort"></i></th>
            <th data-sort="estado">Estado <i class="fa-solid fa-sort"></i></th>
            <th class="text-center">Clientes</th>
            <th class="text-center">Serviços</th>
            <th class="text-end">Ações</th>
          </tr>
        </thead>
        <tbody id="tbody-zonas"></tbody>
      </table>
      <div class="bts-pagination" id="paginacao-zonas"></div>
    </div>

    <div class="bts-empty-state bts-card" id="zonas-empty" style="display:none">
      <i class="fa-solid fa-map-location-dot"></i>
      <p class="mb-3">Nenhuma zona corresponde à pesquisa.</p>
    </div>
  </div>
</div>

<!-- Modal criar/editar -->
<div class="modal fade" id="modal-zona" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <form id="form-zona">
        <div class="modal-header">
          <h5 class="modal-title" id="modal-zona-titulo">Nova Zona</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="alert alert-danger" id="zona-erros" style="display:none"></div>
          <input type="hidden" id="zona-id" />
          <div class="row g-3">
            <div class="col-8">
              <label class="bts-form-label">Nome *</label>
              <input type="text" class="form-control" id="zona-nome" required />
            </div>
            <div class="col-4">
              <label class="bts-form-label">Código</label>
              <input type="text" class="form-control" id="zona-codigo" placeholder="Ex: LIS-N" />
            </div>
            <div class="col-6">
              <label class="bts-form-label">Cor</label>
              <div class="input-group">
                <input type="color" class="form-control form-control-color" id="zona-cor" value="#2979D4" title="Cor da zona" />
                <input type="text" class="form-control" id="zona-cor-hex" value="#2979D4" />
              </div>
              <div class="small text-muted mt-1">Usada no Dashboard e preparada para mapas/relatórios futuros.</div>
            </div>
            <div class="col-6">
              <label class="bts-form-label">Estado</label>
              <select class="form-select" id="zona-estado"></select>
            </div>
            <div class="col-12">
              <label class="bts-form-label">Observações</label>
              <textarea class="form-control" id="zona-observacoes" rows="2"></textarea>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-bts-outline" data-bs-dismiss="modal">Cancelar</button>
          <button type="submit" class="btn btn-bts-primary"><i class="fa-solid fa-floppy-disk me-1"></i>Guardar</button>
        </div>
      </form>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/env.js"></script>
<script src="js/supabaseClient.js"></script>
<script src="js/storage.js"></script>
<script src="js/auth.js"></script>
<script src="js/utils.js"></script>
<script src="js/ui.js"></script>
<script src="js/zonas.js"></script>
</body>
</html>
