<!DOCTYPE html>
<html lang="pt" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cliente | BTS – Gestão</title>
<meta name="robots" content="noindex, nofollow" />
<link rel="icon" type="image/jpeg" href="../assets/images/logo-bts.jpg" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

<link rel="stylesheet" href="../css/variables.css" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
<link rel="stylesheet" href="css/app.css" />
</head>
<body class="bts-app" data-page="clientes">

<div id="bts-sidebar"></div>

<div id="bts-main">
  <div id="bts-topbar"></div>

  <div id="bts-content">
    <a href="clientes.html" class="text-muted small d-inline-block mb-3"><i class="fa-solid fa-arrow-left me-1"></i>Voltar a Clientes</a>

    <div class="bts-detail-header">
      <div class="bts-detail-avatar" id="cliente-avatar"><i class="fa-solid fa-user"></i></div>
      <div class="flex-grow-1">
        <h1 id="cliente-titulo" style="font-family:var(--font-head);font-size:1.7rem;font-weight:700;margin:0">Novo Cliente</h1>
        <p id="cliente-subtitulo" class="text-muted mb-0"></p>
      </div>
      <div class="d-flex gap-2">
        <button class="btn btn-bts-outline" id="btn-duplicar"><i class="fa-solid fa-copy me-1"></i>Duplicar</button>
        <button class="btn btn-outline-danger" id="btn-eliminar"><i class="fa-solid fa-trash me-1"></i>Eliminar</button>
      </div>
    </div>

    <div class="alert alert-danger" id="cliente-erros" style="display:none"></div>

    <form id="form-cliente">
      <div class="row g-3">
        <div class="col-12 col-md-8">
          <div class="bts-card mb-3">
            <div class="bts-card-body">
              <h6 class="mb-3 text-muted text-uppercase small fw-bold">Identificação</h6>
              <div class="row g-3">
                <div class="col-12">
                  <label class="bts-form-label">Nome *</label>
                  <input type="text" class="form-control" id="cliente-nome" required />
                </div>
                <div class="col-6">
                  <label class="bts-form-label">NIF</label>
                  <input type="text" class="form-control" id="cliente-nif" maxlength="9" placeholder="000000000" />
                </div>
                <div class="col-6">
                  <label class="bts-form-label">Estado</label>
                  <select class="form-select" id="cliente-estado"></select>
                </div>
              </div>
            </div>
          </div>

          <div class="bts-card mb-3">
            <div class="bts-card-body">
              <h6 class="mb-3 text-muted text-uppercase small fw-bold">Morada</h6>
              <div class="row g-3">
                <div class="col-12">
                  <label class="bts-form-label">Morada</label>
                  <input type="text" class="form-control" id="cliente-morada" />
                </div>
                <div class="col-4">
                  <label class="bts-form-label">Código Postal</label>
                  <input type="text" class="form-control" id="cliente-codigoPostal" placeholder="0000-000" />
                </div>
                <div class="col-4">
                  <label class="bts-form-label">Localidade</label>
                  <input type="text" class="form-control" id="cliente-localidade" />
                </div>
                <div class="col-4">
                  <label class="bts-form-label">Distrito</label>
                  <input type="text" class="form-control" id="cliente-distrito" />
                </div>
                <div class="col-12">
                  <label class="bts-form-label">Zona</label>
                  <div class="input-group">
                    <select class="form-select" id="cliente-zona"></select>
                    <button type="button" class="btn btn-bts-outline" id="btn-nova-zona" title="Adicionar nova zona"><i class="fa-solid fa-plus"></i></button>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div class="bts-card mb-3">
            <div class="bts-card-body">
              <h6 class="mb-3 text-muted text-uppercase small fw-bold">Contactos</h6>
              <div class="row g-3">
                <div class="col-6">
                  <label class="bts-form-label">Telefone</label>
                  <input type="text" class="form-control" id="cliente-telefone" />
                </div>
                <div class="col-6">
                  <label class="bts-form-label">Telemóvel</label>
                  <input type="text" class="form-control" id="cliente-telemovel" />
                </div>
                <div class="col-6">
                  <label class="bts-form-label">Email</label>
                  <input type="email" class="form-control" id="cliente-email" />
                </div>
                <div class="col-6">
                  <label class="bts-form-label">Pessoa de Contacto</label>
                  <input type="text" class="form-control" id="cliente-contacto" />
                </div>
                <div class="col-12">
                  <label class="bts-form-label">Observações</label>
                  <textarea class="form-control" id="cliente-observacoes" rows="3"></textarea>
                </div>
              </div>
            </div>
          </div>

          <button type="submit" class="btn btn-bts-primary px-4"><i class="fa-solid fa-floppy-disk me-1"></i>Guardar Cliente</button>
        </div>

        <div class="col-12 col-md-4">
          <div class="bts-card" id="bloco-historico">
            <div class="bts-card-body">
              <h6 class="mb-3 text-muted text-uppercase small fw-bold">Histórico de Serviços</h6>
              <div id="lista-historico"></div>
            </div>
          </div>
        </div>
      </div>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/env.js"></script>
<script src="js/supabaseClient.js"></script>
<script src="js/storage.js"></script>
<script src="js/auth.js"></script>
<script src="js/utils.js"></script>
<script src="js/ui.js"></script>
<script src="js/cliente.js"></script>
</body>
</html>
