<!DOCTYPE html>
<html lang="pt" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>O Meu Perfil | BTS – Gestão</title>
<meta name="robots" content="noindex, nofollow" />
<link rel="icon" type="image/jpeg" href="../assets/images/logo-bts.jpg" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

<link rel="stylesheet" href="../css/variables.css" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
<link rel="stylesheet" href="css/app.css" />
</head>
<body class="bts-app" data-page="perfil">

<div id="bts-sidebar"></div>

<div id="bts-main">
  <div id="bts-topbar"></div>

  <div id="bts-content">
    <div class="bts-page-header">
      <div>
        <h1>O Meu Perfil</h1>
        <p>Os teus dados de conta e acesso.</p>
      </div>
    </div>

    <div class="row g-3">
      <!-- Dados do perfil -->
      <div class="col-12 col-lg-7">
        <div class="bts-card mb-3">
          <div class="bts-card-body">
            <h6 class="mb-3 text-muted text-uppercase small fw-bold">Dados Pessoais</h6>

            <div class="alert alert-danger" id="perfil-erro" style="display:none"></div>

            <form id="form-perfil">
              <div class="row g-3">
                <div class="col-12">
                  <label class="bts-form-label">Email</label>
                  <input type="email" class="form-control" id="perfil-email" disabled />
                  <small class="text-muted" style="font-size:.75rem">O email é a tua credencial de acesso e não pode ser alterado aqui.</small>
                </div>
                <div class="col-12">
                  <label class="bts-form-label">Nome completo</label>
                  <input type="text" class="form-control" id="perfil-nome" required minlength="2" />
                </div>
                <div class="col-12">
                  <label class="bts-form-label">URL da foto de perfil</label>
                  <input type="url" class="form-control" id="perfil-avatar" placeholder="https://..." />
                </div>
              </div>
              <button type="submit" class="btn btn-bts-primary mt-3" id="perfil-submit">
                <i class="fa-solid fa-floppy-disk me-1"></i> <span id="perfil-submit-label">Guardar alterações</span>
              </button>
            </form>
          </div>
        </div>
      </div>

      <!-- Avatar + resumo -->
      <div class="col-12 col-lg-5">
        <div class="bts-card mb-3">
          <div class="bts-card-body text-center">
            <div class="bts-detail-avatar mx-auto mb-3" id="perfil-avatar-preview" style="width:88px;height:88px;font-size:1.8rem"><i class="fa-solid fa-user"></i></div>
            <strong id="perfil-nome-preview">—</strong>
            <p class="text-muted mb-0" id="perfil-email-preview" style="font-size:.85rem"></p>
            <p class="text-muted mt-2 mb-0" style="font-size:.78rem" id="perfil-criado-em"></p>
          </div>
        </div>

        <!-- Alterar palavra-passe -->
        <div class="bts-card">
          <div class="bts-card-body">
            <h6 class="mb-3 text-muted text-uppercase small fw-bold">Alterar Palavra-passe</h6>
            <div class="alert alert-danger" id="password-erro" style="display:none"></div>
            <form id="form-password">
              <div class="mb-3">
                <label class="bts-form-label">Nova palavra-passe</label>
                <input type="password" class="form-control" id="password-nova" minlength="6" required autocomplete="new-password" />
              </div>
              <div class="mb-3">
                <label class="bts-form-label">Confirmar nova palavra-passe</label>
                <input type="password" class="form-control" id="password-confirmar" minlength="6" required autocomplete="new-password" />
              </div>
              <button type="submit" class="btn btn-bts-outline w-100" id="password-submit">
                <i class="fa-solid fa-key me-1"></i> <span id="password-submit-label">Alterar palavra-passe</span>
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/env.js"></script>
<script src="js/supabaseClient.js"></script>
<script src="js/storage.js"></script>
<script src="js/auth.js"></script>
<script src="js/utils.js"></script>
<script src="js/ui.js"></script>
<script src="js/perfil.js"></script>
</body>
</html>
