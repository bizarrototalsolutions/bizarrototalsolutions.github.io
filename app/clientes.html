<!DOCTYPE html>
<html lang="pt" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Clientes | BTS – Gestão</title>
<meta name="robots" content="noindex, nofollow" />
<link rel="icon" type="image/jpeg" href="../assets/images/logo-bts.jpg" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

<link rel="stylesheet" href="../css/variables.css" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
<link rel="stylesheet" href="css/app.css" />
</head>
<body class="bts-app" data-page="clientes">

<div id="bts-sidebar"></div>

<div id="bts-main">
  <div id="bts-topbar"></div>

  <div id="bts-content">
    <div class="bts-page-header">
      <div>
        <h1>Clientes</h1>
        <p>Gere a carteira de clientes da BTS.</p>
      </div>
      <a href="cliente.html" class="btn btn-bts-primary">
        <i class="fa-solid fa-plus me-1"></i> Novo Cliente
      </a>
    </div>

    <div class="bts-card mb-3">
      <div class="bts-card-body">
        <div class="bts-filters">
          <div class="bts-search" style="max-width:280px">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="busca-clientes" placeholder="Nome, NIF, telefone, email..." />
          </div>
          <select class="form-select form-select-sm" id="filtro-zona"></select>
          <input type="text" class="form-control form-control-sm" id="filtro-distrito" placeholder="Distrito" />
          <input type="text" class="form-control form-control-sm" id="filtro-cp" placeholder="Código Postal" />
          <select class="form-select form-select-sm" id="filtro-estado"></select>
          <button class="btn btn-sm btn-bts-outline" id="limpar-filtros"><i class="fa-solid fa-filter-circle-xmark me-1"></i>Limpar</button>
          <span class="ms-auto text-muted small" id="contador-clientes"></span>
          <button class="btn btn-sm btn-bts-outline" id="btn-export-excel"><i class="fa-solid fa-file-excel me-1"></i>Excel</button>
          <button class="btn btn-sm btn-bts-outline" id="btn-export-pdf"><i class="fa-solid fa-file-pdf me-1"></i>PDF</button>
        </div>
      </div>
    </div>

    <div class="bts-table-wrap" id="tabela-clientes-wrap">
      <table class="bts-table" id="tabela-clientes">
        <thead>
          <tr>
            <th data-sort="nome">Nome <i class="fa-solid fa-sort"></i></th>
            <th data-sort="nif">NIF <i class="fa-solid fa-sort"></i></th>
            <th data-sort="zona">Zona <i class="fa-solid fa-sort"></i></th>
            <th data-sort="localidade">Localidade <i class="fa-solid fa-sort"></i></th>
            <th data-sort="telefone">Contacto <i class="fa-solid fa-sort"></i></th>
            <th data-sort="estado">Estado <i class="fa-solid fa-sort"></i></th>
            <th data-sort="dataCriacao">Criado em <i class="fa-solid fa-sort"></i></th>
            <th class="text-end">Ações</th>
          </tr>
        </thead>
        <tbody id="tbody-clientes"></tbody>
      </table>
      <div class="bts-pagination" id="paginacao-clientes"></div>
    </div>

    <div class="bts-empty-state bts-card" id="clientes-empty" style="display:none">
      <i class="fa-solid fa-user-slash"></i>
      <p class="mb-3">Ainda não há clientes que correspondam à pesquisa.</p>
      <a href="cliente.html" class="btn btn-bts-primary"><i class="fa-solid fa-plus me-1"></i>Adicionar o primeiro cliente</a>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<script src="js/storage.js"></script>
<script src="js/auth.js"></script>
<script src="js/utils.js"></script>
<script src="js/ui.js"></script>
<script src="js/clientes.js"></script>
</body>
</html>
