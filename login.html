<!DOCTYPE html>
<html lang="pt" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Entrar | BTS – Área Reservada</title>
<meta name="robots" content="noindex, nofollow" />
<link rel="icon" type="image/jpeg" href="assets/images/logo-bts.jpg" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

<link rel="stylesheet" href="css/variables.css" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
<link rel="stylesheet" href="app/css/app.css" />
</head>
<body>

<div class="bts-login-page">
  <div class="bts-login-card">
    <img src="assets/images/logo-bts.jpg" alt="BTS" class="bts-login-logo" />
    <h1 class="bts-login-title">Área Reservada</h1>
    <p class="bts-login-sub">Bizarro Total Solutions — gestão interna</p>

    <div class="alert alert-danger bts-login-error" id="login-error" role="alert"></div>

    <form id="login-form" novalidate>
      <div class="mb-3">
        <label class="bts-form-label" for="username">Utilizador</label>
        <input type="text" class="form-control" id="username" name="username" autocomplete="username" required />
      </div>
      <div class="mb-3">
        <label class="bts-form-label" for="password">Palavra-passe</label>
        <div class="input-group">
          <input type="password" class="form-control" id="password" name="password" autocomplete="current-password" required />
          <button class="btn btn-bts-outline" type="button" id="toggle-password" tabindex="-1"><i class="fa-solid fa-eye"></i></button>
        </div>
      </div>
      <button type="submit" class="btn btn-bts-primary w-100 py-2 mt-2">
        <i class="fa-solid fa-right-to-bracket me-1"></i> Entrar
      </button>
    </form>

    <p class="text-center mt-4 mb-0" style="font-size:.78rem;color:var(--text-light)">
      Credenciais de demonstração: <strong>admin</strong> / <strong>bts2026</strong>
    </p>
    <p class="text-center mt-2 mb-0">
      <a href="index.html" style="font-size:.82rem;color:var(--blue-text)"><i class="fa-solid fa-arrow-left me-1"></i>Voltar ao site</a>
    </p>
  </div>
</div>
...
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-client.js"></script>

<script src="js/utils.js"></script>
<script src="js/auth.js"></script>
<script src="js/login.js"></script>
<script>
  // Se já houver sessão ativa, salta o login e vai para o Dashboard.
  Auth.redirectIfLoggedIn('app/dashboard.html');

  const form = document.getElementById('login-form');
  const errorBox = document.getElementById('login-error');

  form.addEventListener('submit', (e) => {
    e.preventDefault();
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const result = Auth.login(username, password);
    if (result.ok) {
      window.location.href = 'app/dashboard.html';
    } else {
      errorBox.textContent = result.error;
      errorBox.style.display = 'block';
    }
  });

  document.getElementById('toggle-password').addEventListener('click', () => {
    const input = document.getElementById('password');
    const icon = document.querySelector('#toggle-password i');
    if (input.type === 'password') { input.type = 'text'; icon.className = 'fa-solid fa-eye-slash'; }
    else { input.type = 'password'; icon.className = 'fa-solid fa-eye'; }
  });
</script>
</body>

</html>
