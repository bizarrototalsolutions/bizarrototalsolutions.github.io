<!DOCTYPE html>
<html lang="pt" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Entrar | BTS – Área Reservada</title>
<meta name="robots" content="noindex, nofollow" />
<link rel="icon" type="image/jpeg" href="assets/images/logo-bts.jpg" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

<link rel="stylesheet" href="css/variables.css" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
<link rel="stylesheet" href="app/css/app.css" />
</head>
<body>

<div class="bts-login-page">
  <div class="bts-login-card">
    <img src="assets/images/logo-bts.jpg" alt="BTS" class="bts-login-logo" />
    <h1 class="bts-login-title">Área Reservada</h1>
    <p class="bts-login-sub">Bizarro Total Solutions — gestão interna</p>

    <div class="alert alert-danger bts-login-error" id="login-error" role="alert"></div>
    <div class="alert alert-success bts-login-error" id="login-info" role="alert"></div>

    <form id="login-form" novalidate>
      <div class="mb-3">
        <label class="bts-form-label" for="email">Email</label>
        <input type="email" class="form-control" id="email" name="email" autocomplete="username" required />
      </div>
      <div class="mb-2">
        <label class="bts-form-label" for="password">Palavra-passe</label>
        <div class="input-group">
          <input type="password" class="form-control" id="password" name="password" autocomplete="current-password" required minlength="6" />
          <button class="btn btn-bts-outline" type="button" id="toggle-password" tabindex="-1"><i class="fa-solid fa-eye"></i></button>
        </div>
      </div>
      <div class="text-end mb-3">
        <a href="recuperar-password.html" style="font-size:.82rem;color:var(--blue-text)">Esqueceste-te da palavra-passe?</a>
      </div>
      <button type="submit" class="btn btn-bts-primary w-100 py-2 mt-2" id="login-submit">
        <i class="fa-solid fa-right-to-bracket me-1"></i> <span id="login-submit-label">Entrar</span>
      </button>
    </form>

    <p class="text-center mt-4 mb-0" style="font-size:.85rem">
      Ainda não tens conta? <a href="registo.html" style="color:var(--blue-text);font-weight:600">Criar conta</a>
    </p>
    <p class="text-center mt-2 mb-0">
      <a href="index.html" style="font-size:.82rem;color:var(--blue-text)"><i class="fa-solid fa-arrow-left me-1"></i>Voltar ao site</a>
    </p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app/js/env.js"></script>
<script src="app/js/supabaseClient.js"></script>
<script src="app/js/auth.js"></script>
<script>
  const form = document.getElementById('login-form');
  const errorBox = document.getElementById('login-error');
  const infoBox = document.getElementById('login-info');
  const submitBtn = document.getElementById('login-submit');
  const submitLabel = document.getElementById('login-submit-label');

  function esconderMensagens() {
    errorBox.style.display = 'none';
    infoBox.style.display = 'none';
  }

  function definirCarregando(a) {
    submitBtn.disabled = a;
    submitLabel.textContent = a ? 'A entrar…' : 'Entrar';
  }

  (async function iniciar() {
    // Se já houver sessão ativa, salta o login e vai direto para o Dashboard.
    await Auth.redirectIfLoggedIn('app/dashboard.html');

    // Se chegámos aqui vindos da confirmação de email, mostra aviso amigável.
    const params = new URLSearchParams(window.location.search);
    if (params.get('confirmado') === '1') {
      infoBox.textContent = 'Conta confirmada com sucesso. Já podes entrar.';
      infoBox.style.display = 'block';
    }
  })();

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    esconderMensagens();

    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    if (!email || !password) {
      errorBox.textContent = 'Preenche o email e a palavra-passe.';
      errorBox.style.display = 'block';
      return;
    }

    definirCarregando(true);
    const result = await Auth.signIn({ email, password });
    definirCarregando(false);

    if (result.ok) {
      window.location.href = 'app/dashboard.html';
    } else {
      errorBox.textContent = result.error;
      errorBox.style.display = 'block';
    }
  });

  document.getElementById('toggle-password').addEventListener('click', () => {
    const input = document.getElementById('password');
    const icon = document.querySelector('#toggle-password i');
    if (input.type === 'password') { input.type = 'text'; icon.className = 'fa-solid fa-eye-slash'; }
    else { input.type = 'password'; icon.className = 'fa-solid fa-eye'; }
  });
</script>
</body>
</html>
