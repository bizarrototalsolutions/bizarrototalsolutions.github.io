<!DOCTYPE html>
<html lang="pt" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Criar Conta | BTS – Área Reservada</title>
<meta name="robots" content="noindex, nofollow" />
<link rel="icon" type="image/jpeg" href="assets/images/logo-bts.jpg" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

<link rel="stylesheet" href="css/variables.css" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
<link rel="stylesheet" href="app/css/app.css" />
</head>
<body>

<div class="bts-login-page">
  <div class="bts-login-card">
    <img src="assets/images/logo-bts.jpg" alt="BTS" class="bts-login-logo" />
    <h1 class="bts-login-title">Criar Conta</h1>
    <p class="bts-login-sub">Regista-te para aceder à área de gestão</p>

    <div class="alert alert-danger bts-login-error" id="registo-error" role="alert"></div>
    <div class="alert alert-success bts-login-error" id="registo-sucesso" role="alert"></div>

    <form id="registo-form" novalidate>
      <div class="mb-3">
        <label class="bts-form-label" for="full-name">Nome completo</label>
        <input type="text" class="form-control" id="full-name" name="full-name" autocomplete="name" required minlength="2" />
      </div>
      <div class="mb-3">
        <label class="bts-form-label" for="email">Email</label>
        <input type="email" class="form-control" id="email" name="email" autocomplete="username" required />
      </div>
      <div class="mb-3">
        <label class="bts-form-label" for="password">Palavra-passe</label>
        <div class="input-group">
          <input type="password" class="form-control" id="password" name="password" autocomplete="new-password" required minlength="6" />
          <button class="btn btn-bts-outline" type="button" id="toggle-password" tabindex="-1"><i class="fa-solid fa-eye"></i></button>
        </div>
        <small class="text-muted" style="font-size:.75rem">Mínimo 6 caracteres.</small>
      </div>
      <div class="mb-3">
        <label class="bts-form-label" for="password-confirm">Confirmar palavra-passe</label>
        <input type="password" class="form-control" id="password-confirm" name="password-confirm" autocomplete="new-password" required minlength="6" />
      </div>
      <button type="submit" class="btn btn-bts-primary w-100 py-2 mt-2" id="registo-submit">
        <i class="fa-solid fa-user-plus me-1"></i> <span id="registo-submit-label">Criar conta</span>
      </button>
    </form>

    <p class="text-center mt-4 mb-0" style="font-size:.85rem">
      Já tens conta? <a href="login.html" style="color:var(--blue-text);font-weight:600">Entrar</a>
    </p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app/js/env.js"></script>
<script src="app/js/supabaseClient.js"></script>
<script src="app/js/auth.js"></script>
<script>
  const form = document.getElementById('registo-form');
  const errorBox = document.getElementById('registo-error');
  const sucessoBox = document.getElementById('registo-sucesso');
  const submitBtn = document.getElementById('registo-submit');
  const submitLabel = document.getElementById('registo-submit-label');

  function esconderMensagens() {
    errorBox.style.display = 'none';
    sucessoBox.style.display = 'none';
  }

  function definirCarregando(a) {
    submitBtn.disabled = a;
    submitLabel.textContent = a ? 'A criar conta…' : 'Criar conta';
  }

  // Se já houver sessão ativa, salta direto para o Dashboard.
  Auth.redirectIfLoggedIn('app/dashboard.html');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    esconderMensagens();

    const fullName = document.getElementById('full-name').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const passwordConfirm = document.getElementById('password-confirm').value;

    // Validação do formulário
    if (fullName.length < 2) {
      errorBox.textContent = 'Indica o teu nome completo.';
      errorBox.style.display = 'block';
      return;
    }
    const emailValido = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    if (!emailValido) {
      errorBox.textContent = 'Indica um email válido.';
      errorBox.style.display = 'block';
      return;
    }
    if (password.length < 6) {
      errorBox.textContent = 'A palavra-passe deve ter pelo menos 6 caracteres.';
      errorBox.style.display = 'block';
      return;
    }
    if (password !== passwordConfirm) {
      errorBox.textContent = 'As palavras-passe não coincidem.';
      errorBox.style.display = 'block';
      return;
    }

    definirCarregando(true);
    const result = await Auth.signUp({ email, password, fullName });
    definirCarregando(false);

    if (!result.ok) {
      errorBox.textContent = result.error;
      errorBox.style.display = 'block';
      return;
    }

    if (result.confirmacaoNecessaria) {
      // Confirmação de email ativa no projeto Supabase: mostra instrução e não faz login.
      form.reset();
      form.style.display = 'none';
      sucessoBox.innerHTML = 'Conta criada com sucesso! Enviámos um email de confirmação para <strong>' +
        Utils_escapeHtml(email) + '</strong>. Confirma o email e depois entra normalmente.';
      sucessoBox.style.display = 'block';
    } else {
      // Confirmação de email desativada: sessão já ativa, entra logo no Dashboard.
      window.location.href = 'app/dashboard.html';
    }
  });

  // Pequeno escape local (esta página não carrega utils.js de propósito, para ficar leve).
  function Utils_escapeHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#039;');
  }

  document.getElementById('toggle-password').addEventListener('click', () => {
    const input = document.getElementById('password');
    const icon = document.querySelector('#toggle-password i');
    if (input.type === 'password') { input.type = 'text'; icon.className = 'fa-solid fa-eye-slash'; }
    else { input.type = 'password'; icon.className = 'fa-solid fa-eye'; }
  });
</script>
</body>
</html>
